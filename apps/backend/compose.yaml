services:
  api:
    build:
      context: .
      args:
        USER_ID: ${USER_ID:-1000}
        GROUP_ID: ${GROUP_ID:-1000}

    command: >
      uvicorn main:app
      --host 0.0.0.0
      --port 8000
      --reload

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - .:/app
      - ./keys:/app/keys:ro